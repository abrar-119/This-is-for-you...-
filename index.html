<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: rgba(20, 20, 20, 0.85);
            --gold-primary: #dfba6b;
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --text-light: #f5f5f5;
            --text-muted: #b5b5b5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Preloader */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loader-text {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        .loader-line {
            width: 150px;
            height: 2px;
            background: rgba(223, 186, 107, 0.2);
            position: relative;
            overflow: hidden;
        }

        .loader-line::after {
            content: '';
            position: absolute;
            left: -50%;
            width: 50%;
            height: 100%;
            background: var(--gold-gradient);
            animation: loading 1.5s infinite linear;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        /* Main Content Wrap */
        .main-container {
            opacity: 0;
            transition: opacity 1s ease;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Gift Box */
        .gift-container {
            cursor: pointer;
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            perspective: 600px;
        }

        .gift-box {
            width: 100%;
            height: 100%;
            position: absolute;
            background: #1a1a1a;
            border: 2px solid var(--gold-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
        }

        .ribbon-v, .ribbon-h {
            position: absolute;
            background: var(--gold-gradient);
        }
        .ribbon-v { left: 50%; top: 0; width: 24px; height: 100%; transform: translateX(-50%); }
        .ribbon-h { top: 50%; left: 0; height: 24px; width: 100%; transform: translateY(-50%); }

        .gift-lid {
            position: absolute;
            top: -10px;
            left: -5px;
            width: 170px;
            height: 40px;
            background: #222;
            border: 2px solid var(--gold-primary);
            border-radius: 4px;
            z-index: 2;
            transform-origin: bottom;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .lid-ribbon-v { position: absolute; left: 50%; top: 0; width: 24px; height: 100%; transform: translateX(-50%); background: var(--gold-gradient); }
        .lid-ribbon-h { position: absolute; top: 50%; left: 0; height: 24px; width: 100%; transform: translateY(-50%); background: var(--gold-gradient); }

        .gift-container:hover .gift-lid {
            transform: translateY(-5px) rotate(-5deg);
        }

        .instruction-text {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 15px;
            animation: bounce 2s infinite;
            font-weight: 600;
        }

        @keyframes bounce {
            0%, 100%, 20% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
            60% { transform: translateY(-3px); }
        }

        /* Birthday Card */
        .birthday-card {
            display: none;
            background: var(--bg-card);
            border: 1px solid rgba(223, 186, 107, 0.3);
            border-radius: 16px;
            padding: 40px 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: fadeInUp 0.8s ease forwards;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
            font-size: 28px;
            margin-bottom: 20px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .heart {
            color: #e74c3c;
            font-size: 28px;
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.25); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Pure CSS Confetti Elements */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: fly 1.2s ease-out forwards;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-text">Preparing Your Luxury Surprise...</div>
        <div class="loader-line"></div>
    </div>

    <!-- Main Content -->
    <div class="main-container" id="mainContent">
        <div id="boxSection">
            <div class="gift-container" id="giftBoxBtn">
                <div class="gift-lid">
                    <div class="lid-ribbon-v"></div>
                    <div class="lid-ribbon-h"></div>
                </div>
                <div class="gift-box">
                    <div class="ribbon-v"></div>
                    <div class="ribbon-h"></div>
                </div>
            </div>
            <div class="instruction-text">Tap the box to open ✨</div>
        </div>

        <!-- Hidden Birthday Card -->
        <div class="birthday-card" id="birthdayCard">
            <h1>Happy Birthday My Love!</h1>
            <p>May your day be filled with luxury, love, and unending smiles. You deserve the absolute best today and always.</p>
            <div class="heart">❤</div>
        </div>
    </div>

    <script>
        // 🔒 SAFETY SWITCH: Force hide loader after 2.5 seconds max
        const hideLoader = () => {
            const loader = document.getElementById('preloader');
            const content = document.getElementById('mainContent');
            if (loader && loader.style.opacity !== '0') {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    content.style.opacity = '1';
                }, 500);
            }
        };

        // Window load hone par hatayein
        window.addEventListener('load', hideLoader);

        // Backup plan: Agar 2.5 seconds me load nahi hua, toh bhi force khol dein
        setTimeout(hideLoader, 2500);

        // Pure JS & CSS Confetti Blast (No external files needed)
        const boxBtn = document.getElementById('giftBoxBtn');
        const boxSection = document.getElementById('boxSection');
        const card = document.getElementById('birthdayCard');

        if(boxBtn) {
            boxBtn.addEventListener('click', () => {
                for (let i = 0; i < 70; i++) {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    
                    const colors = ['#dfba6b', '#bf953f', '#fcf6ba', '#e74c3c', '#ffffff'];
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 80 + Math.random() * 180;
                    confetti.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                    confetti.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                    
                    confetti.style.left = '50%';
                    confetti.style.top = '50%';
                    
                    boxBtn.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 1200);
                }

                boxBtn.style.transform = 'scale(0.8)';
                boxBtn.style.transition = 'transform 0.3s ease';
                
                setTimeout(() => {
                    boxSection.style.display = 'none';
                    card.style.display = 'block';
                }, 300);
            });
        }
    </script>
</body>
</html>
